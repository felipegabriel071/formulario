<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>

<body>
    <h1 ALIGN="center">CADASTRO DO USUÁRIO</h1>

    <form>

        <fieldset>

            <legend>Dados do usuário</legend>

            <label for="Nome">Nome completo</label><br>
            <input type="text" id="nome" minlength="3" maxlength="50"><br>
            <br>
            <label for="cpf">Cpf</label><br>
            <input type="text" id="cpf" placeholder="Digite seu CPF"><br>
            <br>
            <label for="Data">Data de nascimeno</label><br>
            <input type="date" id="data"><br>
            <br>
            <label for="">Telefone</label><br>
            <input type="tel" id="telefone" pattern="[0-9]{11}" placeholder="1234567890"><br>
            <br>
            <label for="">Email</label><br>
            <input type="email" id="email"><br>
            <br>
            <label for="senha">Senha</label><br>
            <input type="password" id="senha"><br>
            <br>
            <input type="checkbox" required>
            <label>Confirmo que os dados estão corretos</label>
            <button type="submit">Cadastrar</button>

        </fieldset>

    </form>

</body>

</html>
